name: ATLAS CI Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  lint-and-validate:
    name: Lint & Validate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          
      - name: Install Python dependencies
        run: |
          python -m pip install -U pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          
      - name: Install Node.js dependencies
        run: |
          if [ -f package.json ]; then npm ci; fi
          if [ -f app/package.json ]; then cd app && npm ci; fi
          
      - name: Lint Python code
        run: |
          if [ -f requirements.txt ] && grep -q "flake8\|black\|pylint" requirements.txt; then
            echo "Running Python linters..."
            find . -name "*.py" -exec python -m py_compile {} \; || true
          else
            echo "No Python linters configured"
          fi
          
      - name: Lint JavaScript/TypeScript
        run: |
          if [ -f app/package.json ]; then
            cd app
            if npm list eslint >/dev/null 2>&1; then
              npm run lint || true
            else
              echo "ESLint not configured, checking syntax..."
              find . -name "*.js" -exec node -c {} \;
            fi
          fi
          
      - name: Validate Kubernetes manifests
        run: |
          if [ -d infra/k8s ]; then
            echo "Installing kubeval..."
            wget -q https://github.com/instrumenta/kubeval/releases/latest/download/kubeval-linux-amd64.tar.gz
            tar xf kubeval-linux-amd64.tar.gz
            sudo mv kubeval /usr/local/bin
            echo "Validating K8s manifests..."
            find infra/k8s -name "*.yaml" -o -name "*.yml" | xargs kubeval || true
          else
            echo "No Kubernetes manifests found"
          fi

  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: lint-and-validate
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          
      - name: Install dependencies
        run: |
          python -m pip install -U pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          if [ -f app/package.json ]; then cd app && npm ci; fi
          
      - name: Run Python tests
        run: |
          if [ -d tests ] && [ -f requirements.txt ] && grep -q "pytest" requirements.txt; then
            python -m pytest tests/ -v || true
          else
            echo "No Python tests configured or pytest not installed"
          fi
          
      - name: Run Node.js tests
        run: |
          if [ -f app/package.json ]; then
            cd app
            if npm list jest >/dev/null 2>&1 || npm list mocha >/dev/null 2>&1; then
              npm test || true
            else
              echo "No Node.js test framework configured"
            fi
          fi

  build-images:
    name: Build Container Images
    runs-on: ubuntu-latest
    needs: unit-tests
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        
      - name: Build todo-app image
        run: |
          if [ -f app/Dockerfile ]; then
            docker build -t atlas-todo-app:latest ./app
            echo "✅ Todo app image built successfully"
          else
            echo "No Dockerfile found for todo-app"
          fi
          
      - name: Test image functionality
        run: |
          if docker images atlas-todo-app:latest --format "table {{.Repository}}" | grep -q atlas-todo-app; then
            echo "✅ Image atlas-todo-app:latest created successfully"
            docker images atlas-todo-app:latest
          fi

  atlas-phase-check:
    name: ATLAS Implementation Status
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        
      - name: Check implementation status
        run: |
          echo "🔍 ATLAS Implementation Status Check"
          echo "===================================="
          echo ""
          
          # Phase 1: Infrastructure
          echo "📊 Phase 1 - Infrastructure:"
          if [ -d infra/k8s/manual ]; then
            echo "  ✅ K8s manual directory exists"
          else
            echo "  ❌ K8s manual directory missing"
          fi
          
          if find infra/k8s -name "*.yaml" -o -name "*.yml" | grep -q .; then
            echo "  ✅ K8s manifests present"
            echo "  📁 Found manifests:"
            find infra/k8s -name "*.yaml" -o -name "*.yml" | head -5 | sed 's/^/    /'
          else
            echo "  ❌ No K8s manifests found"
          fi
          
          # Phase 2: Agents
          echo ""
          echo "📊 Phase 2 - Agents & RAG:"
          if [ -d agents ]; then
            echo "  ✅ Agents directory exists"
          else
            echo "  ❌ Agents directory missing"
          fi
          
          # Phase 3: MCP
          echo ""
          echo "📊 Phase 3 - MCP & Security:"
          if [ -d mcp ]; then
            echo "  ✅ MCP directory exists"
          else
            echo "  ❌ MCP directory missing"
          fi
          
          # Documentation
          echo ""
          echo "📊 Documentation Status:"
          if [ -f instruction.md ]; then
            echo "  ✅ instruction.md present"
          fi
          if [ -f ATLAS.md ]; then
            echo "  ✅ ATLAS.md present"
          fi
          if [ -d docs/adr ]; then
            echo "  ✅ ADR directory exists"
          else
            echo "  ❌ ADR directory missing"
          fi
          
          echo ""
          echo "🎯 Next recommended actions:"
          echo "  1. Run Phase 1 execution: gh workflow run atlas-execution-plan.yml -f phase=phase1"
          echo "  2. Create K8s manifests from compose.yaml"
          echo "  3. Setup monitoring infrastructure"
          echo "  4. Begin agent implementation"
