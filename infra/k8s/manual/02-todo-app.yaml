apiVersion: apps/v1
kind: Deployment
metadata:
  name: todo-app
  namespace: atlas
  labels:
    app.kubernetes.io/name: todo-app
    app.kubernetes.io/component: frontend
    app.kubernetes.io/part-of: atlas-system
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: todo-app
  template:
    metadata:
      labels:
        app.kubernetes.io/name: todo-app
        app.kubernetes.io/component: frontend
        app.kubernetes.io/part-of: atlas-system
    spec:
      containers:
        - name: todo-app
          image: todo-app:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3000
              name: http
            - containerPort: 35729
              name: livereload
          env:
            - name: NODE_ENV
              valueFrom:
                configMapKeyRef:
                  name: atlas-config
                  key: NODE_ENV
            - name: MONGO_URI
              value: "mongodb://todo-database:27017/todolist"
          resources:
            requests:
              memory: "128Mi"
              cpu: "50m"
            limits:
              memory: "256Mi"
              cpu: "200m"
          livenessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 5
      # Dependencies handled by service discovery
---
apiVersion: v1
kind: Service
metadata:
  name: todo-app
  namespace: atlas
  labels:
    app.kubernetes.io/name: todo-app
    app.kubernetes.io/component: frontend
spec:
  type: ClusterIP
  ports:
    - port: 3000
      targetPort: 3000
      name: http
    - port: 35729
      targetPort: 35729
      name: livereload
  selector:
    app.kubernetes.io/name: todo-app
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: todo-app-ingress
  namespace: atlas
  labels:
    app.kubernetes.io/name: todo-app
    app.kubernetes.io/component: ingress
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
spec:
  rules:
    - host: atlas-todo.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: todo-app
                port:
                  number: 3000