apiVersion: apps/v1
kind: Deployment
metadata:
  name: coqui-tts
  namespace: atlas
  labels:
    app.kubernetes.io/name: coqui-tts
    app.kubernetes.io/component: tts-backend
    app.kubernetes.io/part-of: atlas-system
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: coqui-tts
  template:
    metadata:
      labels:
        app.kubernetes.io/name: coqui-tts
        app.kubernetes.io/component: tts-backend
        app.kubernetes.io/part-of: atlas-system
    spec:
      containers:
        - name: coqui-tts
          image: ghcr.io/coqui-ai/tts-cpu:latest
          ports:
            - containerPort: 5002
              name: http
          env:
            - name: COQUI_TTS_MODEL
              valueFrom:
                configMapKeyRef:
                  name: atlas-config
                  key: COQUI_TTS_MODEL
          command:
            - python3
            - TTS/server/server.py
            - --model_name
            - $(COQUI_TTS_MODEL)
          resources:
            requests:
              memory: "512Mi"
              cpu: "200m"
            limits:
              memory: "2Gi"
              cpu: "1000m"
          livenessProbe:
            httpGet:
              path: /
              port: 5002
            initialDelaySeconds: 60
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /
              port: 5002
            initialDelaySeconds: 30
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: coqui-tts
  namespace: atlas
  labels:
    app.kubernetes.io/name: coqui-tts
    app.kubernetes.io/component: tts-backend
spec:
  type: ClusterIP
  ports:
    - port: 5002
      targetPort: 5002
      name: http
  selector:
    app.kubernetes.io/name: coqui-tts
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mcp-tts
  namespace: atlas
  labels:
    app.kubernetes.io/name: mcp-tts
    app.kubernetes.io/component: mcp-server
    app.kubernetes.io/part-of: atlas-system
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: mcp-tts
  template:
    metadata:
      labels:
        app.kubernetes.io/name: mcp-tts
        app.kubernetes.io/component: mcp-server
        app.kubernetes.io/part-of: atlas-system
    spec:
      containers:
        - name: mcp-tts
          image: ghcr.io/blacktop/mcp-tts:latest
          ports:
            - containerPort: 4004
              name: mcp
          env:
            - name: MCP_PORT
              valueFrom:
                configMapKeyRef:
                  name: atlas-config
                  key: MCP_PORT
            - name: ATLAS_TTS_PROVIDERS
              valueFrom:
                configMapKeyRef:
                  name: atlas-config
                  key: ATLAS_TTS_PROVIDERS
            - name: COQUI_TTS_BASE_URL
              valueFrom:
                configMapKeyRef:
                  name: atlas-config
                  key: COQUI_TTS_BASE_URL
          resources:
            requests:
              memory: "128Mi"
              cpu: "50m"
            limits:
              memory: "256Mi"
              cpu: "200m"
          livenessProbe:
            httpGet:
              path: /health
              port: 4004
            initialDelaySeconds: 30
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /health
              port: 4004
            initialDelaySeconds: 10
            periodSeconds: 5
      # Dependencies handled by service discovery
---
apiVersion: v1
kind: Service
metadata:
  name: mcp-tts
  namespace: atlas
  labels:
    app.kubernetes.io/name: mcp-tts
    app.kubernetes.io/component: mcp-server
spec:
  type: ClusterIP
  ports:
    - port: 4004
      targetPort: 4004
      name: mcp
  selector:
    app.kubernetes.io/name: mcp-tts