---
# ATLAS Web API Deployment (FastAPI/Uvicorn)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: web-api
  namespace: atlas
  labels:
    app.kubernetes.io/name: web-api
    app.kubernetes.io/part-of: atlas-system
    app.kubernetes.io/component: api
spec:
  replicas: 2
  revisionHistoryLimit: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: web-api
  template:
    metadata:
      labels:
        app: web-api
        app.kubernetes.io/name: web-api
        app.kubernetes.io/part-of: atlas-system
        app.kubernetes.io/component: api
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8000"
        prometheus.io/path: "/metrics"
    spec:
      containers:
      - name: web-api
        # NOTE: заміни образ на власний реєстр перед деплоєм
        image: atlas/web-api:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8000
          name: http
        env:
        - name: ATLAS_ALLOWED_ORIGINS
          value: "http://localhost:3000,http://localhost:8000,http://127.0.0.1:8000"
        - name: ATLAS_REQUIRE_AUTH
          value: "false"
        readinessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 10
          periodSeconds: 10
          timeoutSeconds: 2
          failureThreshold: 3
        livenessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 30
          periodSeconds: 20
          timeoutSeconds: 2
          failureThreshold: 3
        resources:
          requests:
            cpu: "250m"
            memory: "256Mi"
          limits:
            cpu: "1"
            memory: "1Gi"

---
# ClusterIP service for internal access + port-forward for local debug
apiVersion: v1
kind: Service
metadata:
  name: web-api
  namespace: atlas
  labels:
    app.kubernetes.io/name: web-api
    app.kubernetes.io/part-of: atlas-system
spec:
  ports:
  - port: 8000
    targetPort: 8000
    protocol: TCP
    name: http
  selector:
    app: web-api

---
# Keep at least one pod available during voluntary disruptions
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: web-api-pdb
  namespace: atlas
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: web-api

---
# Optional: autoscaling if metrics-server is installed
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: web-api-hpa
  namespace: atlas
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: web-api
  minReplicas: 2
  maxReplicas: 5
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
