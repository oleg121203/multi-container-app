apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: todo-database
  namespace: atlas
  labels:
    app.kubernetes.io/name: todo-database
    app.kubernetes.io/component: database
    app.kubernetes.io/part-of: atlas-system
spec:
  serviceName: todo-database
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: todo-database
  template:
    metadata:
      labels:
        app.kubernetes.io/name: todo-database
        app.kubernetes.io/component: database
        app.kubernetes.io/part-of: atlas-system
    spec:
      containers:
        - name: mongo
          image: mongo:6
          ports:
            - containerPort: 27017
              name: mongo
          env:
            - name: MONGO_INITDB_ROOT_USERNAME
              valueFrom:
                secretKeyRef:
                  name: mongo-secret
                  key: username
            - name: MONGO_INITDB_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: mongo-secret
                  key: password
          volumeMounts:
            - name: mongo-data
              mountPath: /data/db
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          livenessProbe:
            exec:
              command:
                - mongo
                - --eval
                - "db.adminCommand('ping')"
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            exec:
              command:
                - mongo
                - --eval
                - "db.adminCommand('ping')"
            initialDelaySeconds: 5
            periodSeconds: 5
  volumeClaimTemplates:
    - metadata:
        name: mongo-data
      spec:
        accessModes: ["ReadWriteOnce"]
        storageClassName: atlas-storage
        resources:
          requests:
            storage: 1Gi
---
apiVersion: v1
kind: Service
metadata:
  name: todo-database
  namespace: atlas
  labels:
    app.kubernetes.io/name: todo-database
    app.kubernetes.io/component: database
spec:
  type: ClusterIP
  ports:
    - port: 27017
      targetPort: 27017
      name: mongo
  selector:
    app.kubernetes.io/name: todo-database
---
apiVersion: v1
kind: Secret
metadata:
  name: mongo-secret
  namespace: atlas
type: Opaque
data:
  username: YWRtaW4=  # admin
  password: cGFzc3dvcmQ=  # password (change in production!)