apiVersion: v1
kind: Namespace
metadata:
  name: atlas
  labels:
    name: atlas
    app.kubernetes.io/name: atlas
    app.kubernetes.io/part-of: atlas-system
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: atlas-config
  namespace: atlas
data:
  NODE_ENV: "production"
  ATLAS_TTS_PROVIDERS: "say_tts,openai_tts,elevenlabs_tts,google_tts,coqui_tts"
  COQUI_TTS_BASE_URL: "http://coqui-tts:5002"
  MCP_PORT: "4004"
  COQUI_TTS_MODEL: "tts_models/multilingual/multi-dataset/xtts_v2"
---
apiVersion: v1
kind: StorageClass
metadata:
  name: atlas-storage
provisioner: kubernetes.io/host-path
volumeBindingMode: WaitForFirstConsumer
reclaimPolicy: Retain
parameters:
  type: DirectoryOrCreate
  path: /var/lib/atlas-data