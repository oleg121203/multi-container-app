---
# Atlas Secrets Template
# Copy this file to 11-atlas-secrets.yaml and fill in real values
# NEVER commit real secrets to Git
apiVersion: v1
kind: Secret
metadata:
  name: atlas-secrets
  namespace: atlas
  labels:
    app.kubernetes.io/name: atlas-secrets
    app.kubernetes.io/part-of: atlas-system
type: Opaque
stringData:
  # LLM Provider API Keys (base64 encode in production)
  openai-api-key: "your-openai-api-key-here"
  anthropic-api-key: "your-anthropic-api-key-here"
  google-api-key: "your-google-api-key-here"
  mistral-api-key: "your-mistral-api-key-here"
  
  # Linear API Key
  linear-api-key: "your-linear-api-key-here"
  
  # Orkes Conductor (if used)
  orkes-api-key: "your-orkes-api-key-here"
  
  # TTS Provider Keys
  elevenlabs-api-key: "your-elevenlabs-api-key-here"
  google-tts-api-key: "your-google-tts-api-key-here"

---
# Atlas ConfigMap for non-sensitive configuration
apiVersion: v1
kind: ConfigMap
metadata:
  name: atlas-config
  namespace: atlas
  labels:
    app.kubernetes.io/name: atlas-config
    app.kubernetes.io/part-of: atlas-system
data:
  # LLM Configuration
  ATLAS_LLM1_PROVIDER: "openai"
  ATLAS_LLM1_MODEL: "gpt-4o-mini"
  ATLAS_LLM1_FALLBACKS: "anthropic:claude-3-sonnet,mistral:mistral-small-latest"
  
  ATLAS_LLM2_PROVIDER: "ollama"
  ATLAS_LLM2_MODEL: "gpt-oss:latest"
  ATLAS_LLM2_ALLOW_FALLBACK: "false"
  ATLAS_LLM2_FALLBACKS: "openai:gpt-4o-mini,anthropic:claude-3-sonnet"
  
  ATLAS_LLM3_PROVIDER: "openai"
  ATLAS_LLM3_MODEL: "gpt-4o-mini"
  ATLAS_LLM3_FALLBACKS: "anthropic:claude-3-sonnet,mistral:mistral-small-latest"
  
  # Vector Database
  QDRANT_HOST: "qdrant"
  QDRANT_PORT: "6333"
  QDRANT_COLLECTION_NAME: "atlas_memory"
  
  # Cache
  REDIS_HOST: "redis"
  REDIS_PORT: "6379"
  REDIS_TTL: "3600"
  SEMANTIC_SIMILARITY_THRESHOLD: "0.85"
  
  # Ollama
  OLLAMA_HOST: "ollama"
  OLLAMA_PORT: "11434"
  OLLAMA_MODEL: "gpt-oss:latest"
  
  # Linear API
  LINEAR_API_URL: "https://api.linear.app/graphql"
  
  # MCP Servers
  ATLAS_MCP_SERVERS: "playwright,automation,tts"
  
  # TTS Configuration
  ATLAS_TTS_PROVIDERS: "openai_tts,elevenlabs_tts,google_tts"
  ATLAS_TTS_AGENT_VOICE_LLM1: "voiceA"
  ATLAS_TTS_AGENT_VOICE_LLM2: "voiceB"
  ATLAS_TTS_AGENT_VOICE_LLM3: "voiceC"
  ATLAS_TTS_LANG: "en"
  
  # Agent Registry
  ATLAS_AGENT_REGISTRY_PATH: "/config/agents.json"
  ATLAS_ROLE_TEMPLATES_PATH: "/config/roles"
  
  # Live Debate Mode
  ATLAS_DEBATE_MODE_ENABLED: "false"
  ATLAS_DEBATE_INTENSITY: "0.5"
  ATLAS_DEBATE_AGGRESSION: "0.2"
  ATLAS_DEBATE_TURN_SECONDS: "30"
  ATLAS_DEBATE_MAX_ROUNDS: "5"