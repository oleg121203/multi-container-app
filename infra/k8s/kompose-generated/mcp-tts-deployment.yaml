apiVersion: apps/v1
kind: Deployment
metadata:
  annotations:
    kompose.cmd: kompose convert -f compose.yaml -o infra/k8s/kompose-generated/
    kompose.version: 1.31.2 (a92241f79)
  creationTimestamp: null
  labels:
    io.kompose.service: mcp-tts
  name: mcp-tts
spec:
  replicas: 1
  selector:
    matchLabels:
      io.kompose.service: mcp-tts
  strategy: {}
  template:
    metadata:
      annotations:
        kompose.cmd: kompose convert -f compose.yaml -o infra/k8s/kompose-generated/
        kompose.version: 1.31.2 (a92241f79)
      creationTimestamp: null
      labels:
        io.kompose.network/multi-container-app-default: "true"
        io.kompose.service: mcp-tts
    spec:
      containers:
        - env:
            - name: ATLAS_TTS_PROVIDERS
              value: say_tts,openai_tts,elevenlabs_tts,google_tts,coqui_tts
            - name: COQUI_TTS_BASE_URL
              value: http://coqui-tts:5002
            - name: MCP_PORT
              value: "4004"
          image: ghcr.io/blacktop/mcp-tts:latest
          livenessProbe:
            exec:
              command:
                - wget
                - -qO-
                - http://localhost:4004/health
            failureThreshold: 5
            periodSeconds: 15
            timeoutSeconds: 5
          name: mcp-tts
          ports:
            - containerPort: 4004
              hostPort: 4004
              protocol: TCP
          resources: {}
      restartPolicy: Always
status: {}
