# Comments are provided throughout this file to help you get started.
# If you need more help, visit the Docker compose reference guide at
# https://docs.docker.com/compose/compose-file/

# Here the instructions define your application as two services called "todo-app" and “todo-database”
# The service “todo-app” is built from the Dockerfile in the /app directory,
# and the service “todo-database” uses the official MongoDB image 
# from Docker Hub - https://hub.docker.com/_/mongo. 
# You can add other services your application may depend on here.

services:
  todo-app:
    build:
      context: ./app
    depends_on:
      - todo-database
    environment:
      NODE_ENV: production
    ports:
      - 3000:3000
      - 35729:35729
    develop:
      watch:
        - path: ./app/package.json
          action: rebuild
        - path: ./app
          target: /usr/src/app
          action: sync

  todo-database:
    image: mongo:6
    #volumes: 
    #  - database:/data/db
    ports:
      - 27017:27017

  # MCP: Text-to-Speech server (blacktop/mcp-tts) + local Coqui TTS backend
  mcp-tts:
    image: ghcr.io/blacktop/mcp-tts:latest
    ports:
      - "4004:4004"
    environment:
      MCP_PORT: "4004"
      ATLAS_TTS_PROVIDERS: "say_tts,openai_tts,elevenlabs_tts,google_tts,coqui_tts"
      COQUI_TTS_BASE_URL: "http://coqui-tts:5002"
      # OPENAI_API_KEY: ${OPENAI_API_KEY}
      # ELEVENLABS_API_KEY: ${ELEVENLABS_API_KEY}
      # GOOGLE_TTS_API_KEY: ${GOOGLE_TTS_API_KEY}
    depends_on:
      - coqui-tts
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:4004/health"]
      interval: 15s
      timeout: 5s
      retries: 5

  coqui-tts:
    image: ghcr.io/coqui-ai/tts-cpu:latest
    ports:
      - "5002:5002"
    environment:
      COQUI_TTS_MODEL: ${COQUI_TTS_MODEL:-tts_models/multilingual/multi-dataset/xtts_v2}
    command: ["python3", "TTS/server/server.py", "--model_name", "${COQUI_TTS_MODEL:-tts_models/multilingual/multi-dataset/xtts_v2}"]
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:5002"]
      interval: 20s
      timeout: 5s
      retries: 5

  # Phase 2: Vector database for RAG (MEM-01)
  qdrant:
    image: qdrant/qdrant:v1.7.0
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage
    environment:
      QDRANT__SERVICE__HTTP_PORT: 6333
      QDRANT__SERVICE__GRPC_PORT: 6334
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Phase 2: Redis for semantic cache
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 15s
      timeout: 5s
      retries: 3

  # Phase 2: Ollama for LLM2 (CFG-02)
  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    environment:
      OLLAMA_HOST: 0.0.0.0
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11434/api/tags"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # Phase 2: LLM1 Agent with RAG
  llm1-agent:
    build:
      context: ./agents
      dockerfile: Dockerfile.llm1
    ports:
      - "8001:8001"
    environment:
      - QDRANT_HOST=qdrant
      - REDIS_HOST=redis
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - GOOGLE_API_KEY=${GOOGLE_API_KEY}
    depends_on:
      - qdrant
      - redis
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Phase 2: LLM2 Orchestrator Agent
  llm2-agent:
    build:
      context: ./agents
      dockerfile: Dockerfile.llm2
    ports:
      - "8002:8002"
    environment:
      - OLLAMA_HOST=ollama
      - LINEAR_API_KEY=${LINEAR_API_KEY}
      - ATLAS_LLM2_ALLOW_FALLBACK=${ATLAS_LLM2_ALLOW_FALLBACK:-false}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - GOOGLE_API_KEY=${GOOGLE_API_KEY}
    depends_on:
      - ollama
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8002/health"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  qdrant_data:
  redis_data:
  ollama_data:
  #database: