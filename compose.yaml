# Comments are provided throughout this file to help you get started.
# If you need more help, visit the Docker compose reference guide at
# https://docs.docker.com/compose/compose-file/

# Here the instructions define your application as two services called "todo-app" and “todo-database”
# The service “todo-app” is built from the Dockerfile in the /app directory,
# and the service “todo-database” uses the official MongoDB image 
# from Docker Hub - https://hub.docker.com/_/mongo. 
# You can add other services your application may depend on here.

services:
  todo-app:
    build:
      context: ./app
    depends_on:
      - todo-database
    environment:
      NODE_ENV: production
    ports:
      - 3000:3000
      - 35729:35729
    develop:
      watch:
        - path: ./app/package.json
          action: rebuild
        - path: ./app
          target: /usr/src/app
          action: sync

  todo-database:
    image: mongo:6
    #volumes: 
    #  - database:/data/db
    ports:
      - 27017:27017

  # MCP: Text-to-Speech server (use synesthesiam/coqui-tts instead)
  mcp-tts:
    image: synesthesiam/coqui-tts:latest
    ports:
      - "4004:5002"
    environment:
      TTS_MODEL: "tts_models/multilingual/multi-dataset/xtts_v2"
      TTS_LANGUAGE: "uk"
    command: ["python3", "-m", "TTS.server.server", "--model_name", "tts_models/multilingual/multi-dataset/xtts_v2"]
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:5002"]
      interval: 15s
      timeout: 5s
      retries: 5

  coqui-tts:
    image: synesthesiam/coqui-tts:latest
    ports:
      - "5002:5002"
    environment:
      COQUI_TTS_MODEL: ${COQUI_TTS_MODEL:-tts_models/multilingual/multi-dataset/xtts_v2}
    command: ["python3", "-m", "TTS.server.server", "--model_name", "${COQUI_TTS_MODEL:-tts_models/multilingual/multi-dataset/xtts_v2}"]
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:5002"]
      interval: 20s
      timeout: 5s
      retries: 5

  # Phase 2: Vector database for RAG (MEM-01)
  qdrant:
    image: qdrant/qdrant:v1.7.0
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage
    environment:
      QDRANT__SERVICE__HTTP_PORT: 6333
      QDRANT__SERVICE__GRPC_PORT: 6334
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Phase 2: Redis for semantic cache
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 15s
      timeout: 5s
      retries: 3

  # Phase 2: Ollama (using local host installation)
  # ollama:
  #   image: ollama/ollama:latest
  #   ports:
  #     - "11434:11434"
  #   volumes:
  #     - ollama_data:/root/.ollama
  #   environment:
  #     OLLAMA_HOST: 0.0.0.0
  #   healthcheck:
  #     test: ["CMD", "curl", "-f", "http://localhost:11434/api/tags"]
  #     interval: 30s
  #     timeout: 10s
  #     retries: 3
  #     start_period: 60s

  # Phase 2: LLM1 Agent with RAG
  llm1-agent:
    build:
      context: ./agents
      dockerfile: Dockerfile.llm1
    ports:
      - "8001:8001"
    environment:
      - QDRANT_HOST=qdrant
      - REDIS_HOST=redis
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - GOOGLE_API_KEY=${GOOGLE_API_KEY}
    depends_on:
      - qdrant
      - redis
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Phase 2: LLM2 Orchestrator Agent
  llm2-agent:
    build:
      context: ./agents
      dockerfile: Dockerfile.llm2
    ports:
      - "8002:8002"
    environment:
      - OLLAMA_HOST=host.docker.internal
      - OLLAMA_PORT=11434
      - LINEAR_API_KEY=${LINEAR_API_KEY}
      - ATLAS_LLM2_ALLOW_FALLBACK=${ATLAS_LLM2_ALLOW_FALLBACK:-false}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - GOOGLE_API_KEY=${GOOGLE_API_KEY}
      # Phase 3: MCP Hub configuration - Extended
      - ATLAS_MCP_SERVERS=${ATLAS_MCP_SERVERS:-playwright,automation,tts,redis,mac-automation,mac-gui,file-manager}
      - ATLAS_MCP_PLAYWRIGHT_URL=http://mcp-playwright:4001
      - ATLAS_MCP_AUTOMATION_URL=http://mcp-automation:4002
      - ATLAS_MCP_TTS_URL=http://mcp-tts:4004
      - ATLAS_MCP_STT_URL=http://mcp-stt:8080
      - ATLAS_MCP_REDIS_URL=http://mcp-redis:4005
      - ATLAS_MCP_FILE_MANAGER_URL=http://mcp-file-manager:4006
      - ATLAS_MCP_MAC_AUTOMATION_URL=http://mcp-macos-automation:4007
      - ATLAS_MCP_MAC_NATIVE_URL=http://mcp-macos-native:4008
      - ATLAS_MCP_KUBERNETES_URL=http://mcp-kubernetes:4009
    depends_on:
      - mcp-tts
      - mcp-redis
      - mcp-file-manager
      - mcp-macos-automation
      - mcp-kubernetes
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8002/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Phase 3: LLM3 Security Agent
  llm3-agent:
    build:
      context: ./agents
      dockerfile: Dockerfile.llm3
    ports:
      - "8003:8003"
    environment:
      - ATLAS_LLM3_PROVIDER=${ATLAS_LLM3_PROVIDER:-openai}
      - ATLAS_LLM3_MODEL=${ATLAS_LLM3_MODEL:-gpt-4o-mini}
      - ATLAS_LLM3_API_KEY=${ATLAS_LLM3_API_KEY:-${OPENAI_API_KEY}}
      - ATLAS_LLM3_AUTO_MITIGATION=${ATLAS_LLM3_AUTO_MITIGATION:-false}
      - ATLAS_LLM3_SEVERITY_THRESHOLD=${ATLAS_LLM3_SEVERITY_THRESHOLD:-HIGH}
      - ATLAS_LLM3_PORT=8003
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8003/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Phase 3: Playwright MCP Server
  mcp-playwright:
    build:
      context: ./agents/mcp_servers/playwright
      dockerfile: Dockerfile
    ports:
      - "4001:4001"
    environment:
      - MCP_PORT=4001
      - PLAYWRIGHT_MAX_PAGES=5
      - PLAYWRIGHT_PAGE_TIMEOUT=30000
      - PLAYWRIGHT_ALLOWED_DOMAINS=${PLAYWRIGHT_ALLOWED_DOMAINS:-}
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - SYS_ADMIN  # Required for Chrome sandbox
    shm_size: 2gb
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4001/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Phase 3: MCP STT (Speech-to-Text) Server
  mcp-stt:
    image: ghcr.io/openai/whisper:latest
    ports:
      - "8080:8080"
    environment:
      - STT_MODEL=${ATLAS_STT_MODEL:-base}
      - STT_LANGUAGE=${ATLAS_STT_LANGUAGE:-en}
      - MCP_PORT=8080
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Phase 3: Falco Security Monitoring
  falco:
    image: falcosecurity/falco-no-driver:latest
    privileged: true
    volumes:
      - /var/run/docker.sock:/host/var/run/docker.sock:ro
      - /dev:/host/dev:ro
      - /proc:/host/proc:ro
      - /boot:/host/boot:ro
      - /lib/modules:/host/lib/modules:ro
      - /usr:/host/usr:ro
      - /etc:/host/etc:ro
      - ./config/falco:/etc/falco:ro
    environment:
      - FALCO_GRPC_ENABLED=true
      - FALCO_GRPC_BIND_ADDRESS=0.0.0.0:5060
      - FALCO_WEBHOOK_URL=http://llm3-agent:8003/falco-event
    command:
      - /usr/bin/falco
      - --cri
      - /run/containerd/containerd.sock
      - --disable-source
      - syscall
      - --enable-source
      - k8s_audit
      - --k8s-api
      - http://kubernetes:443
    healthcheck:
      test: ["CMD", "grpc_health_probe", "-addr=localhost:5060"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ==================== NEW MCP SERVICES ====================
  
  # Official Redis MCP Server
  mcp-redis:
    image: ghcr.io/redis/mcp-redis:latest
    ports:
      - "4005:4005"
    environment:
      - REDIS_URL=redis://redis:6379
      - MCP_REDIS_PORT=4005
    depends_on:
      - redis
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4005/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # File Manager MCP Server
  mcp-file-manager:
    build:
      context: ./agents/mcp_servers/file_manager
    ports:
      - "4006:4006"
    environment:
      - MCP_FILE_MANAGER_PORT=4006
      - ALLOWED_PATHS=/workspace,/tmp
      - MAX_FILE_SIZE=10MB
    volumes:
      - ./data:/workspace:rw
      - /tmp:/tmp:rw
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4006/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # macOS Automation MCP Server (PyAutoGUI-based)
  mcp-macos-automation:
    build:
      context: ./agents/mcp_servers/macos_automation
    ports:
      - "4007:4007"
    environment:
      - MCP_MACOS_PORT=4007
      - AUTOMATION_MODE=safe
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4007/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # macOS Native Automation MCP Server (AppleScript-based)
  mcp-macos-native:
    build:
      context: ./agents/mcp_servers/macos_native
    ports:
      - "4008:4008"
    environment:
      - MCP_MACOS_NATIVE_PORT=4008
      - NATIVE_AUTOMATION=true
    platform: darwin/arm64
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4008/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Kubernetes Management MCP Server
  mcp-kubernetes:
    build:
      context: ./agents/mcp_servers/kubernetes
    ports:
      - "4009:4009"
    environment:
      - MCP_K8S_PORT=4009
      - KUBECONFIG=/kubeconfig/config
    volumes:
      - ~/.kube:/kubeconfig:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4009/health"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  qdrant_data:
  redis_data:
  # ollama_data: # Not needed - using local Ollama installation
  #database: