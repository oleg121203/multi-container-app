# Comments are provided throughout this file to help you get started.
# If you need more help, visit the Docker compose reference guide at
# https://docs.docker.com/compose/compose-file/

# Here the instructions define your application as two services called "todo-app" and “todo-database”
# The service “todo-app” is built from the Dockerfile in the /app directory,
# and the service “todo-database” uses the official MongoDB image 
# from Docker Hub - https://hub.docker.com/_/mongo. 
# You can add other services your application may depend on here.

services:
  todo-app:
    build:
      context: ./app
    depends_on:
      - todo-database
    environment:
      NODE_ENV: production
    ports:
      - 3000:3000
      - 35729:35729
    develop:
      watch:
        - path: ./app/package.json
          action: rebuild
        - path: ./app
          target: /usr/src/app
          action: sync

  todo-database:
    image: mongo:6
    #volumes: 
    #  - database:/data/db
    ports:
      - 27017:27017

  # MCP: Text-to-Speech server (blacktop/mcp-tts) + local Coqui TTS backend
  mcp-tts:
    image: ghcr.io/blacktop/mcp-tts:latest
    ports:
      - "4004:4004"
    environment:
      MCP_PORT: "4004"
      ATLAS_TTS_PROVIDERS: "say_tts,openai_tts,elevenlabs_tts,google_tts,coqui_tts"
      COQUI_TTS_BASE_URL: "http://coqui-tts:5002"
      # OPENAI_API_KEY: ${OPENAI_API_KEY}
      # ELEVENLABS_API_KEY: ${ELEVENLABS_API_KEY}
      # GOOGLE_TTS_API_KEY: ${GOOGLE_TTS_API_KEY}
    depends_on:
      - coqui-tts
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:4004/health"]
      interval: 15s
      timeout: 5s
      retries: 5

  coqui-tts:
    image: ghcr.io/coqui-ai/tts-cpu:latest
    ports:
      - "5002:5002"
    environment:
      COQUI_TTS_MODEL: ${COQUI_TTS_MODEL:-tts_models/multilingual/multi-dataset/xtts_v2}
    command: ["python3", "TTS/server/server.py", "--model_name", "${COQUI_TTS_MODEL:-tts_models/multilingual/multi-dataset/xtts_v2}"]
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:5002"]
      interval: 20s
      timeout: 5s
      retries: 5

  # Phase 2: Vector database for RAG (MEM-01)
  qdrant:
    image: qdrant/qdrant:v1.7.0
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage
    environment:
      QDRANT__SERVICE__HTTP_PORT: 6333
      QDRANT__SERVICE__GRPC_PORT: 6334
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Phase 2: Redis for semantic cache
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 15s
      timeout: 5s
      retries: 3

  # Phase 2: Ollama for LLM2 (CFG-02)
  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    environment:
      OLLAMA_HOST: 0.0.0.0
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11434/api/tags"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # Phase 2: LLM1 Agent with RAG
  llm1-agent:
    build:
      context: ./agents
      dockerfile: Dockerfile.llm1
    ports:
      - "8001:8001"
    environment:
      - QDRANT_HOST=qdrant
      - REDIS_HOST=redis
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - GOOGLE_API_KEY=${GOOGLE_API_KEY}
    depends_on:
      - qdrant
      - redis
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Phase 2: LLM2 Orchestrator Agent
  llm2-agent:
    build:
      context: ./agents
      dockerfile: Dockerfile.llm2
    ports:
      - "8002:8002"
    environment:
      - OLLAMA_HOST=ollama
      - LINEAR_API_KEY=${LINEAR_API_KEY}
      - ATLAS_LLM2_ALLOW_FALLBACK=${ATLAS_LLM2_ALLOW_FALLBACK:-false}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - GOOGLE_API_KEY=${GOOGLE_API_KEY}
      # Phase 3: MCP Hub configuration
      - ATLAS_MCP_SERVERS=${ATLAS_MCP_SERVERS:-playwright,automation,tts}
      - ATLAS_MCP_PLAYWRIGHT_URL=http://mcp-playwright:4001
      - ATLAS_MCP_AUTOMATION_URL=http://mcp-automation:4002
      - ATLAS_MCP_TTS_URL=http://mcp-tts:4004
      - ATLAS_MCP_STT_URL=http://mcp-stt:8080
    depends_on:
      - ollama
      - mcp-playwright
      - mcp-tts
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8002/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Phase 3: LLM3 Security Agent
  llm3-agent:
    build:
      context: ./agents
      dockerfile: Dockerfile.llm3
    ports:
      - "8003:8003"
    environment:
      - ATLAS_LLM3_PROVIDER=${ATLAS_LLM3_PROVIDER:-openai}
      - ATLAS_LLM3_MODEL=${ATLAS_LLM3_MODEL:-gpt-4o-mini}
      - ATLAS_LLM3_API_KEY=${ATLAS_LLM3_API_KEY:-${OPENAI_API_KEY}}
      - ATLAS_LLM3_AUTO_MITIGATION=${ATLAS_LLM3_AUTO_MITIGATION:-false}
      - ATLAS_LLM3_SEVERITY_THRESHOLD=${ATLAS_LLM3_SEVERITY_THRESHOLD:-HIGH}
      - ATLAS_LLM3_PORT=8003
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8003/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Phase 3: Playwright MCP Server
  mcp-playwright:
    build:
      context: ./agents/mcp_servers/playwright
      dockerfile: Dockerfile
    ports:
      - "4001:4001"
    environment:
      - MCP_PORT=4001
      - PLAYWRIGHT_MAX_PAGES=5
      - PLAYWRIGHT_PAGE_TIMEOUT=30000
      - PLAYWRIGHT_ALLOWED_DOMAINS=${PLAYWRIGHT_ALLOWED_DOMAINS:-}
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - SYS_ADMIN  # Required for Chrome sandbox
    shm_size: 2gb
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4001/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Phase 3: MCP STT (Speech-to-Text) Server
  mcp-stt:
    image: ghcr.io/openai/whisper:latest
    ports:
      - "8080:8080"
    environment:
      - STT_MODEL=${ATLAS_STT_MODEL:-base}
      - STT_LANGUAGE=${ATLAS_STT_LANGUAGE:-en}
      - MCP_PORT=8080
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Phase 3: Falco Security Monitoring
  falco:
    image: falcosecurity/falco-no-driver:latest
    privileged: true
    volumes:
      - /var/run/docker.sock:/host/var/run/docker.sock:ro
      - /dev:/host/dev:ro
      - /proc:/host/proc:ro
      - /boot:/host/boot:ro
      - /lib/modules:/host/lib/modules:ro
      - /usr:/host/usr:ro
      - /etc:/host/etc:ro
      - ./config/falco:/etc/falco:ro
    environment:
      - FALCO_GRPC_ENABLED=true
      - FALCO_GRPC_BIND_ADDRESS=0.0.0.0:5060
      - FALCO_WEBHOOK_URL=http://llm3-agent:8003/falco-event
    command:
      - /usr/bin/falco
      - --cri
      - /run/containerd/containerd.sock
      - --disable-source
      - syscall
      - --enable-source
      - k8s_audit
      - --k8s-api
      - http://kubernetes:443
    healthcheck:
      test: ["CMD", "grpc_health_probe", "-addr=localhost:5060"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  qdrant_data:
  redis_data:
  ollama_data:
  #database: