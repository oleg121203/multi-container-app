<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MCP Hub - Hacker Frontend (Express Standalone)</title>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.160.0/examples/js/loaders/GLTFLoader.js"></script>
    <script src="/config.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'JetBrains Mono', monospace;
            background: #000000;
            color: #00ff66;
            overflow: hidden;
            height: 100vh;
        }

        #app {
            display: flex;
            height: 100vh;
            position: relative;
        }

        /* Head 3D Container */
        #head3d-container {
            position: absolute;
            top: 20px;
            left: 20px;
            width: 280px;
            height: 280px;
            border: 2px solid #00ff66;
            border-radius: 8px;
            background: rgba(0, 0, 0, 0.8);
            z-index: 10;
        }

        #head3d-canvas {
            width: 100%;
            height: 100%;
            border-radius: 6px;
        }

        #head3d-overlay {
            position: absolute;
            bottom: 8px;
            left: 8px;
            right: 8px;
            background: rgba(0, 0, 0, 0.9);
            padding: 8px;
            border-radius: 4px;
            font-size: 12px;
            text-align: center;
        }

        /* Chat Container */
        #chat-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            margin-left: 320px;
            padding: 20px;
        }

        /* Navigation */
        #nav-panel {
            position: absolute;
            top: 50%;
            right: 20px;
            transform: translateY(-50%);
            background: rgba(0, 255, 102, 0.1);
            border: 1px solid #00ff66;
            border-radius: 8px;
            padding: 15px;
            z-index: 20;
            transition: opacity 0.3s ease;
        }

        #nav-panel.hidden {
            opacity: 0.3;
        }

        .nav-button {
            display: block;
            width: 100%;
            padding: 10px 15px;
            margin: 5px 0;
            background: transparent;
            border: 1px solid #00ff66;
            color: #00ff66;
            border-radius: 4px;
            font-family: inherit;
            cursor: pointer;
            transition: all 0.2s ease;
            font-size: 12px;
        }

        .nav-button:hover {
            background: #00ff66;
            color: #000000;
        }

        .nav-button.active {
            background: #00ff66;
            color: #000000;
        }

        /* Chat Interface */
        #chat-header {
            text-align: center;
            padding: 20px 0;
            border-bottom: 1px solid #00ff66;
            margin-bottom: 20px;
        }

        #chat-title {
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 10px;
        }

        #chat-mode-selector {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-top: 15px;
        }

        .mode-button {
            padding: 8px 16px;
            background: transparent;
            border: 1px solid #00ff66;
            color: #00ff66;
            border-radius: 4px;
            font-family: inherit;
            cursor: pointer;
            transition: all 0.2s ease;
            font-size: 12px;
        }

        .mode-button:hover,
        .mode-button.active {
            background: #00ff66;
            color: #000000;
        }

        #chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px 0;
            margin-bottom: 20px;
        }

        .message {
            margin-bottom: 15px;
            padding: 12px;
            border-radius: 8px;
            position: relative;
        }

        .message.user {
            background: rgba(0, 255, 102, 0.1);
            border: 1px solid #00ff66;
            margin-left: 50px;
        }

        .message.atlas {
            background: rgba(0, 255, 102, 0.05);
            border: 1px solid rgba(0, 255, 102, 0.3);
            margin-right: 50px;
        }

        .message-sender {
            font-size: 11px;
            opacity: 0.7;
            margin-bottom: 5px;
        }

        .message-text {
            line-height: 1.5;
        }

        .message-timestamp {
            font-size: 10px;
            opacity: 0.5;
            position: absolute;
            bottom: 4px;
            right: 8px;
        }

        /* Input Area */
        #chat-input-area {
            display: flex;
            gap: 10px;
            align-items: flex-end;
            border-top: 1px solid #00ff66;
            padding-top: 20px;
        }

        #chat-input {
            flex: 1;
            background: transparent;
            border: 1px solid #00ff66;
            color: #00ff66;
            padding: 12px;
            border-radius: 4px;
            font-family: inherit;
            font-size: 14px;
            resize: vertical;
            min-height: 44px;
            max-height: 120px;
        }

        #chat-input:focus {
            outline: none;
            border-color: #00ff66;
            box-shadow: 0 0 10px rgba(0, 255, 102, 0.3);
        }

        #chat-input::placeholder {
            color: rgba(0, 255, 102, 0.5);
        }

        .input-button {
            padding: 12px 16px;
            background: transparent;
            border: 1px solid #00ff66;
            color: #00ff66;
            border-radius: 4px;
            font-family: inherit;
            cursor: pointer;
            transition: all 0.2s ease;
            white-space: nowrap;
        }

        .input-button:hover {
            background: #00ff66;
            color: #000000;
        }

        .input-button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .input-button.active {
            background: #00ff66;
            color: #000000;
        }

        /* TTS Controls */
        #tts-controls {
            display: flex;
            gap: 10px;
            margin-top: 10px;
            font-size: 12px;
        }

        #tts-provider,
        #tts-voice {
            background: transparent;
            border: 1px solid rgba(0, 255, 102, 0.5);
            color: #00ff66;
            padding: 5px 8px;
            border-radius: 4px;
            font-family: inherit;
            font-size: 11px;
        }

        /* Loading Indicator */
        .loading {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 2px solid rgba(0, 255, 102, 0.3);
            border-radius: 50%;
            border-top-color: #00ff66;
            animation: spin 1s ease-in-out infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Connectivity Banner */
        #connectivity-banner {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            background: #ff4444;
            color: white;
            padding: 8px;
            text-align: center;
            font-size: 12px;
            z-index: 1000;
            transform: translateY(-100%);
            transition: transform 0.3s ease;
        }

        #connectivity-banner.show {
            transform: translateY(0);
        }

        /* Hidden elements */
        .hidden {
            display: none !important;
        }

        /* Scrollbar styling */
        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: rgba(0, 255, 102, 0.1);
        }

        ::-webkit-scrollbar-thumb {
            background: rgba(0, 255, 102, 0.5);
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #00ff66;
        }
    </style>
</head>
<body>
    <div id="connectivity-banner">
        З'єднання втрачено. Спроба підключення...
    </div>

    <div id="app">
        <!-- 3D Head -->
        <div id="head3d-container">
            <canvas id="head3d-canvas"></canvas>
            <div id="head3d-overlay">
                <span id="head3d-status">Завантаження моделі...</span>
            </div>
        </div>

        <!-- Navigation Panel -->
        <div id="nav-panel">
            <button class="nav-button active" data-mode="chat">💬 Чат</button>
            <button class="nav-button" data-mode="dashboard">📊 Дашборд</button>
            <button class="nav-button" data-mode="control">⚙️ Управління</button>
        </div>

        <!-- Chat Container -->
        <div id="chat-container">
            <div id="chat-header">
                <h1 id="chat-title">🤖 MCP Hub - Hacker Chat</h1>
                <div id="chat-mode-selector">
                    <button class="mode-button active" data-chat-mode="atlas">Atlas</button>
                    <button class="mode-button" data-chat-mode="grisha">Grisha</button>
                    <button class="mode-button" data-chat-mode="consulting">Consulting</button>
                </div>
            </div>

            <div id="chat-messages">
                <div class="message atlas">
                    <div class="message-sender">Atlas System</div>
                    <div class="message-text">🤖 Smart Chat System готова! Оберіть режим: Atlas (координація) або Grisha (живе спілкування)</div>
                    <div class="message-timestamp">Зараз</div>
                </div>
            </div>

            <div id="chat-input-area">
                <textarea 
                    id="chat-input" 
                    placeholder="Введіть повідомлення..."
                    rows="1"
                ></textarea>
                <button id="voice-button" class="input-button" title="Голосовий ввід">🎤</button>
                <button id="send-button" class="input-button">Надіслати</button>
            </div>

            <div id="tts-controls">
                <select id="tts-provider" aria-label="Провайдер TTS">
                    <option value="ukraine">Ukraine TTS</option>
                    <option value="coqui">Coqui TTS</option>
                    <option value="gemini">Gemini TTS</option>
                </select>
                <select id="tts-voice" aria-label="Голос TTS">
                    <option value="atlas">Atlas</option>
                    <option value="dmytro">Dmytro</option>
                    <option value="tetiana">Tetiana</option>
                </select>
                <button id="continuous-mode" class="input-button">🔄 Безперервний</button>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
